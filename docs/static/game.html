<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DroneWar</title>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --border: #30363d; --border2: #484f58;
    --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
    --red: #f85149; --red2: #da3633; --red-dim: rgba(248,81,73,0.15);
    --blue: #58a6ff; --blue2: #1f6feb; --blue-dim: rgba(88,166,255,0.15);
    --green: #3fb950; --amber: #d29922; --purple: #bc8cff;
    --cyan: #39d353;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; overflow: hidden; height: 100vh; }

  /* ── START SCREEN ── */
  #start-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .start-inner { width: 760px; max-width: 95vw; }
  .start-title { font-size: 36px; font-weight: 700; letter-spacing: 4px; text-align: center; margin-bottom: 4px; }
  .start-title span.r { color: var(--red); }
  .start-title span.b { color: var(--blue); }
  .start-sub { text-align: center; color: var(--text2); margin-bottom: 28px; letter-spacing: 2px; font-size: 11px; }

  .scenario-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .scenario-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; cursor: pointer; transition: border-color .15s, background .15s;
  }
  .scenario-card:hover { border-color: var(--blue); background: var(--bg3); }
  .scenario-card.selected { border-color: var(--blue); background: var(--blue-dim); }
  .scenario-card .label { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .scenario-card .desc  { font-size: 11px; color: var(--text2); line-height: 1.5; margin-bottom: 8px; }
  .scenario-card .meta  { font-size: 10px; color: var(--text3); }
  .diff-easy   { color: var(--green); }
  .diff-medium { color: var(--amber); }
  .diff-hard   { color: var(--red); }

  .teams-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .team-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .team-box .team-label { font-size: 11px; font-weight: 600; letter-spacing: 1px; margin-bottom: 10px; }
  .team-box.red  .team-label { color: var(--red); }
  .team-box.blue .team-label { color: var(--blue); }
  .agent-btn {
    display: block; width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 7px 10px; margin-bottom: 6px;
    cursor: pointer; text-align: left; font-family: inherit; font-size: 12px; transition: border-color .1s;
  }
  .agent-btn:hover { border-color: var(--border2); }
  .agent-btn.selected { border-color: var(--blue); background: var(--blue-dim); }
  .agent-btn span { font-size: 10px; color: var(--text3); display: block; margin-top: 2px; }

  .launch-btn {
    width: 100%; padding: 14px; background: var(--blue2); border: none; border-radius: 8px;
    color: white; font-family: inherit; font-size: 14px; font-weight: 600;
    letter-spacing: 2px; cursor: pointer; transition: background .15s;
  }
  .launch-btn:hover { background: var(--blue); }

  /* ── GAME LAYOUT ── */
  #game-screen { display: none; height: 100vh; flex-direction: column; }
  #game-screen.active { display: flex; }

  #topbar {
    height: 40px; background: var(--bg2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 14px; gap: 16px; flex-shrink: 0;
  }
  .tb-title { font-weight: 700; font-size: 13px; letter-spacing: 2px; }
  .tb-title span.r { color: var(--red); }
  .tb-title span.b { color: var(--blue); }
  .tb-sep { color: var(--border2); }
  .tb-stat { font-size: 11px; color: var(--text2); }
  .tb-stat strong { color: var(--text); }
  .tb-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .tb-btn {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text2); padding: 3px 9px; font-family: inherit; font-size: 11px;
    cursor: pointer; transition: color .1s, border-color .1s;
  }
  .tb-btn:hover { color: var(--text); border-color: var(--border2); }

  #main-area { display: flex; flex: 1; overflow: hidden; }

  /* ── HEX CANVAS ── */
  #canvas-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: var(--bg); position: relative; overflow: hidden;
  }
  canvas { cursor: crosshair; }

  /* ── SIDE PANEL ── */
  #side-panel {
    width: 260px; background: var(--bg2); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  .panel-section { border-bottom: 1px solid var(--border); padding: 10px 12px; }
  .panel-section h3 { font-size: 10px; letter-spacing: 1px; color: var(--text3); margin-bottom: 8px; }

  /* score bars */
  .score-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .score-label { width: 34px; font-size: 10px; font-weight: 600; }
  .score-label.r { color: var(--red); }
  .score-label.b { color: var(--blue); }
  .score-bar-wrap { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 3px; transition: width .4s; }
  .score-bar.r { background: var(--red); }
  .score-bar.b { background: var(--blue); }
  .score-val { font-size: 10px; color: var(--text2); width: 32px; text-align: right; }

  /* ROE */
  .roe-row { display: flex; align-items: center; gap: 6px; }
  .roe-pips { display: flex; gap: 3px; }
  .roe-pip { width: 8px; height: 8px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--border2); }
  .roe-pip.active { background: var(--amber); border-color: var(--amber); }
  .roe-pip.danger { background: var(--red); border-color: var(--red); }

  /* drone list */
  #drone-list { overflow-y: auto; flex: 1; }
  .drone-item {
    padding: 6px 12px; border-bottom: 1px solid var(--bg3);
    display: flex; align-items: center; gap: 6px; cursor: pointer; transition: background .1s;
  }
  .drone-item:hover { background: var(--bg3); }
  .drone-item.selected { background: var(--red-dim); }
  .drone-role-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .drone-info { flex: 1; }
  .drone-id   { font-size: 11px; font-weight: 600; }
  .drone-meta { font-size: 10px; color: var(--text3); }
  .drone-status { font-size: 10px; }
  .status-active    { color: var(--green); }
  .status-destroyed { color: var(--red); }
  .status-objective { color: var(--cyan); }
  .status-rtb       { color: var(--text3); }

  /* log */
  #log-wrap { height: 140px; overflow-y: auto; flex-shrink: 0; border-top: 1px solid var(--border); padding: 8px 12px; }
  .log-line  { font-size: 10px; color: var(--text2); line-height: 1.6; }
  .log-line.hit    { color: var(--blue); }
  .log-line.kill   { color: var(--red); }
  .log-line.obj    { color: var(--cyan); }
  .log-line.roe    { color: var(--amber); }
  .log-line.spoof  { color: var(--purple); }
  .log-line.turn   { color: var(--text3); border-top: 1px solid var(--bg3); margin-top: 4px; padding-top: 4px; }

  /* bottom action bar */
  #action-bar {
    height: 44px; background: var(--bg2); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 12px; gap: 8px; flex-shrink: 0;
  }
  .action-btn {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 5px;
    color: var(--text); padding: 5px 11px; font-family: inherit; font-size: 11px;
    cursor: pointer; transition: border-color .1s, background .1s;
  }
  .action-btn:hover { border-color: var(--blue2); }
  .action-btn.end-turn { background: var(--blue2); border-color: var(--blue2); font-weight: 600; margin-left: auto; }
  .action-btn.end-turn:hover { background: var(--blue); }
  #status-msg { font-size: 11px; color: var(--text2); }

  /* overlay */
  #overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
    align-items: center; justify-content: center; z-index: 50;
  }
  #overlay.show { display: flex; }
  .overlay-box {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    padding: 32px 40px; text-align: center; min-width: 320px;
  }
  .overlay-box h2 { font-size: 22px; margin-bottom: 8px; }
  .overlay-box .sub { color: var(--text2); font-size: 12px; margin-bottom: 20px; }
  .overlay-box .stats { font-size: 11px; color: var(--text3); margin-bottom: 22px; line-height: 2; }
  .overlay-box .stats strong { color: var(--text); }
  .overlay-row { display: flex; gap: 10px; justify-content: center; }
  .overlay-btn {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 9px 20px; font-family: inherit; font-size: 12px;
    cursor: pointer; transition: border-color .1s;
  }
  .overlay-btn:hover { border-color: var(--blue); }
  .overlay-btn.primary { background: var(--blue2); border-color: var(--blue2); }
  .overlay-btn.primary:hover { background: var(--blue); }
</style>
</head>
<body>

<!-- ── START SCREEN ── -->
<div id="start-screen">
  <div class="start-inner">
    <div class="start-title"><span class="r">DRONE</span><span class="b">WAR</span></div>
    <div class="start-sub">TACTICAL UAV WARFARE SIMULATION</div>

    <div class="scenario-grid" id="scenario-grid"></div>

    <div class="teams-row">
      <div class="team-box red">
        <div class="team-label">▶ RED — SWARM OPERATOR</div>
        <button class="agent-btn selected" data-team="red" data-type="heuristic">
          Heuristic AI <span>Tactical swarm routing, EW activation, spoofing</span>
        </button>
        <button class="agent-btn" data-team="red" data-type="random">
          Random AI <span>Baseline — moves randomly toward objectives</span>
        </button>
        <button class="agent-btn" data-team="red" data-type="human">
          Human <span>You control Red — choose drone moves and EW</span>
        </button>
      </div>
      <div class="team-box blue">
        <div class="team-label">▶ BLUE — C-UAS DEFENDER</div>
        <button class="agent-btn selected" data-team="blue" data-type="heuristic">
          Heuristic AI <span>Track management, intercept sequencing, EW suppression</span>
        </button>
        <button class="agent-btn" data-team="blue" data-type="random">
          Random AI <span>Baseline — engages random tracks</span>
        </button>
        <button class="agent-btn" data-team="blue" data-type="human">
          Human <span>You control Blue — engage targets, reposition interceptors</span>
        </button>
      </div>
    </div>

    <button class="launch-btn" id="launch-btn">LAUNCH MISSION</button>
  </div>
</div>

<!-- ── GAME SCREEN ── -->
<div id="game-screen">
  <div id="topbar">
    <div class="tb-title"><span class="r">DRONE</span><span class="b">WAR</span></div>
    <div class="tb-sep">│</div>
    <div class="tb-stat" id="tb-scenario"></div>
    <div class="tb-sep">│</div>
    <div class="tb-stat">Turn <strong id="tb-turn">—</strong> / <strong id="tb-deadline">—</strong></div>
    <div class="tb-sep">│</div>
    <div class="tb-stat">Active <strong id="tb-active">—</strong></div>
    <div class="tb-sep">│</div>
    <div class="tb-stat">Tracks <strong id="tb-tracks">—</strong></div>
    <div class="tb-right">
      <button class="tb-btn" id="btn-menu">Menu</button>
    </div>
  </div>

  <div id="main-area">
    <div id="canvas-wrap">
      <canvas id="hex-canvas"></canvas>
    </div>

    <div id="side-panel">
      <div class="panel-section">
        <h3>MISSION STATUS</h3>
        <div class="score-row">
          <div class="score-label r">RED</div>
          <div class="score-bar-wrap"><div class="score-bar r" id="bar-red" style="width:0%"></div></div>
          <div class="score-val" id="val-red">0%</div>
        </div>
        <div class="score-row">
          <div class="score-label b">BLUE</div>
          <div class="score-bar-wrap"><div class="score-bar b" id="bar-blue" style="width:0%"></div></div>
          <div class="score-val" id="val-blue">0%</div>
        </div>
        <div class="roe-row" style="margin-top:8px">
          <div class="tb-stat" style="font-size:10px;margin-right:4px;">ROE</div>
          <div class="roe-pips" id="roe-pips"></div>
          <div class="tb-stat" style="font-size:10px;margin-left:6px;" id="roe-label"></div>
        </div>
      </div>

      <div class="panel-section">
        <h3>SWARM STATUS</h3>
      </div>
      <div id="drone-list"></div>

      <div id="log-wrap">
        <div id="log"></div>
      </div>
    </div>
  </div>

  <div id="action-bar">
    <div id="status-msg">Waiting for game state…</div>
    <button class="action-btn" id="btn-end-turn" style="display:none">End Turn</button>
  </div>
</div>

<!-- ── END OVERLAY ── -->
<div id="overlay">
  <div class="overlay-box">
    <h2 id="ov-title"></h2>
    <div class="sub" id="ov-sub"></div>
    <div class="stats" id="ov-stats"></div>
    <div class="overlay-row">
      <button class="overlay-btn primary" id="ov-rematch">Play Again</button>
      <button class="overlay-btn" id="ov-menu">Main Menu</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const HEX_SIZE = 26;
const POLL_MS  = 600;

// ── STATE ─────────────────────────────────────────────────────────────────────
let state        = null;
let scenarios    = {};
let selectedScen = "forward_strike";
let redType      = "heuristic";
let blueType     = "heuristic";
let pollTimer    = null;
let lastTurn     = -1;
let selectedDrone = null;

// ── HEX GEOMETRY ─────────────────────────────────────────────────────────────
function hexToPixel(q, r, cx, cy) {
  const x = HEX_SIZE * (3/2 * q);
  const y = HEX_SIZE * (Math.sqrt(3)/2 * q + Math.sqrt(3) * r);
  return [cx + x, cy + y];
}

function hexDist(a, b) {
  const dq = b[0]-a[0], dr = b[1]-a[1];
  return Math.max(Math.abs(dq), Math.abs(dr), Math.abs(dq+dr));
}

// ── CANVAS RENDER ─────────────────────────────────────────────────────────────
function drawHex(ctx, cx, cy, q, r, fill, stroke, alpha=1) {
  const [px, py] = hexToPixel(q, r, cx, cy);
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i - 30);
    const x = px + HEX_SIZE * 0.92 * Math.cos(angle);
    const y = py + HEX_SIZE * 0.92 * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 0.5;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawCircle(ctx, x, y, r, fill, stroke='none', lw=1) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = fill;
  ctx.fill();
  if (stroke !== 'none') { ctx.strokeStyle = stroke; ctx.lineWidth = lw; ctx.stroke(); }
}

function drawCross(ctx, x, y, size, color) {
  ctx.strokeStyle = color; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x-size, y-size); ctx.lineTo(x+size, y+size); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+size, y-size); ctx.lineTo(x-size, y+size); ctx.stroke();
}

function drawDiamond(ctx, x, y, size, fill) {
  ctx.beginPath();
  ctx.moveTo(x, y-size); ctx.lineTo(x+size, y); ctx.lineTo(x, y+size); ctx.lineTo(x-size, y); ctx.closePath();
  ctx.fillStyle = fill; ctx.fill();
}

const TERRAIN_FILL = {
  open: '#0d1117', urban: '#1a1a2e', forest: '#0d2010',
  water: '#0d1a2e', mountain: '#1e1512',
};

function render() {
  if (!state || !state.drones) return;
  const canvas = document.getElementById('hex-canvas');
  const wrap   = document.getElementById('canvas-wrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  const ctx = canvas.getContext('2d');
  const cx  = canvas.width  / 2;
  const cy  = canvas.height / 2;

  // Build cell map from drones/sensors positions to infer bounds
  const radius = state.radius || 9;

  // Draw hex cells (approximate — we don't have full cell data, draw disk)
  for (let q = -radius; q <= radius; q++) {
    const rLo = Math.max(-radius, -q-radius);
    const rHi = Math.min( radius, -q+radius);
    for (let r = rLo; r <= rHi; r++) {
      const isTarget = state.targets && state.targets.some(t => t[0]===q && t[1]===r);
      const fill = isTarget ? '#0d2a1a' : TERRAIN_FILL.open;
      const stroke = isTarget ? '#1a4a2a' : '#1a2030';
      drawHex(ctx, cx, cy, q, r, fill, stroke);
      if (isTarget) {
        const [px, py] = hexToPixel(q, r, cx, cy);
        ctx.fillStyle = 'rgba(57,211,83,0.12)';
        ctx.fill();
        ctx.strokeStyle = '#3fb950';
        ctx.lineWidth = 1;
        ctx.stroke();
        // Target symbol
        ctx.fillStyle = '#3fb950';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('✦', px, py);
      }
    }
  }

  // Draw sensor ranges (faint circles)
  for (const s of state.sensors || []) {
    const [px, py] = hexToPixel(s.position[0], s.position[1], cx, cy);
    const rangeR = s.range * HEX_SIZE * 1.73;
    ctx.beginPath();
    ctx.arc(px, py, rangeR, 0, Math.PI*2);
    ctx.strokeStyle = s.suppressed ? 'rgba(218,54,51,0.15)' : 'rgba(88,166,255,0.08)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Draw tracks
  for (const t of state.tracks || []) {
    const [px, py] = hexToPixel(t.position[0], t.position[1], cx, cy);
    const col = t.is_spoofed ? '#bc8cff' : `rgba(88,166,255,${0.4 + t.confidence*0.5})`;
    drawCross(ctx, px, py, 7, col);
    ctx.fillStyle = col;
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(t.is_spoofed ? 'SPOOF' : `T${t.confidence.toFixed(1)}`, px, py - 11);
  }

  // Draw sensors
  for (const s of state.sensors || []) {
    const [px, py] = hexToPixel(s.position[0], s.position[1], cx, cy);
    const col = s.suppressed ? '#da3633' : (s.operational ? '#58a6ff' : '#484f58');
    ctx.strokeStyle = col; ctx.lineWidth = 1.5;
    ctx.strokeRect(px-5, py-5, 10, 10);
    ctx.fillStyle = 'rgba(88,166,255,0.1)'; ctx.fillRect(px-5, py-5, 10, 10);
    ctx.fillStyle = col; ctx.font = '8px monospace';
    ctx.textAlign = 'center'; ctx.fillText(s.type[0].toUpperCase(), px, py+3);
  }

  // Draw interceptors
  for (const ic of state.interceptors || []) {
    const [px, py] = hexToPixel(ic.position[0], ic.position[1], cx, cy);
    const col = ic.available ? '#58a6ff' : '#484f58';
    drawDiamond(ctx, px, py, 7, ic.available ? 'rgba(88,166,255,0.2)' : 'rgba(72,79,88,0.2)');
    ctx.strokeStyle = col; ctx.lineWidth = 1.2;
    const sz = 7;
    ctx.beginPath();
    ctx.moveTo(px, py-sz); ctx.lineTo(px+sz, py); ctx.lineTo(px, py+sz); ctx.lineTo(px-sz, py); ctx.closePath();
    ctx.stroke();
    // Reload indicator
    if (!ic.available && ic.cooldown > 0) {
      ctx.fillStyle = '#d29922'; ctx.font = '9px monospace';
      ctx.textAlign = 'center'; ctx.fillText(ic.cooldown, px, py+3);
    }
    // Range ring on hover (skip for now)
  }

  // Draw drones
  const ROLE_COLORS = {
    strike: '#f85149', isr: '#39d353', decoy: '#d29922', ew: '#bc8cff',
  };
  for (const d of state.drones || []) {
    if (d.status === 'destroyed') continue;
    const [px, py] = hexToPixel(d.position[0], d.position[1], cx, cy);
    const col = ROLE_COLORS[d.role] || '#f85149';
    const isSelected = selectedDrone && selectedDrone.id === d.id;
    const alpha = d.status === 'rtb' ? 0.4 : 1;

    if (isSelected) {
      ctx.beginPath(); ctx.arc(px, py, 16, 0, Math.PI*2);
      ctx.strokeStyle = col; ctx.lineWidth = 1; ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
    }

    // Drone body
    const sz = d.status === 'objective' ? 9 : 7;
    ctx.globalAlpha = alpha;
    drawCircle(ctx, px, py, sz, col + '33', col, 1.5);

    // Jammer indicator
    if (d.jammer_active) {
      ctx.beginPath(); ctx.arc(px, py, sz+5, 0, Math.PI*2);
      ctx.strokeStyle = '#bc8cff'; ctx.lineWidth = 0.8; ctx.setLineDash([2,3]); ctx.stroke(); ctx.setLineDash([]);
    }

    // Role glyph
    const glyphs = { strike: '✕', isr: '◎', decoy: '◇', ew: '⚡' };
    ctx.fillStyle = col; ctx.font = '9px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(glyphs[d.role] || '?', px, py);

    // ID label
    ctx.fillStyle = col + 'cc'; ctx.font = '8px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(d.id.replace('_', ' '), px, py + sz + 3);
    ctx.globalAlpha = 1;
  }
}

// ── UPDATE UI ─────────────────────────────────────────────────────────────────
function updateUI(s) {
  document.getElementById('tb-turn').textContent     = s.turn;
  document.getElementById('tb-deadline').textContent = s.deadline;
  document.getElementById('tb-active').textContent   = (s.drones||[]).filter(d=>d.status==='active').length;
  document.getElementById('tb-tracks').textContent   = (s.tracks||[]).length;

  const rPct = Math.round((s.red_score||0)*100);
  const bPct = Math.round((s.blue_score||0)*100);
  document.getElementById('bar-red').style.width  = rPct + '%';
  document.getElementById('bar-blue').style.width = bPct + '%';
  document.getElementById('val-red').textContent  = rPct + '%';
  document.getElementById('val-blue').textContent = bPct + '%';

  // ROE pips
  const pips = document.getElementById('roe-pips');
  const thresh = s.roe_threshold || 3;
  const viols  = s.roe_violations || 0;
  pips.innerHTML = '';
  for (let i = 0; i < thresh; i++) {
    const pip = document.createElement('div');
    pip.className = 'roe-pip' + (i < viols ? (viols >= thresh-1 ? ' danger' : ' active') : '');
    pips.appendChild(pip);
  }
  document.getElementById('roe-label').textContent = `${viols}/${thresh} violations`;

  // Drone list
  const dl = document.getElementById('drone-list');
  dl.innerHTML = '';
  for (const d of (s.drones||[])) {
    const div = document.createElement('div');
    div.className = 'drone-item' + (selectedDrone && selectedDrone.id === d.id ? ' selected' : '');
    div.onclick = () => { selectedDrone = d; render(); updateUI(state); };
    const roleColors = { strike:'#f85149', isr:'#39d353', decoy:'#d29922', ew:'#bc8cff' };
    const statusClass = { active:'status-active', destroyed:'status-destroyed',
                          objective:'status-objective', rtb:'status-rtb' }[d.status] || '';
    div.innerHTML = `
      <div class="drone-role-dot" style="background:${roleColors[d.role]||'#888'}"></div>
      <div class="drone-info">
        <div class="drone-id">${d.id}</div>
        <div class="drone-meta">${d.role} · spd ${d.speed} · rcs ${d.rcs}</div>
      </div>
      <div class="drone-status ${statusClass}">${d.status}</div>`;
    dl.appendChild(div);
  }

  // Status msg
  const msg = document.getElementById('status-msg');
  const cfg = s.config || {};
  const ht  = cfg.human_team || 'none';
  if (s.winner) {
    msg.textContent = '';
  } else if (ht === 'none') {
    msg.textContent = `Turn ${s.turn} — AI vs AI`;
  } else {
    msg.textContent = `Turn ${s.turn} — ${s.status === 'animating' ? 'Processing…' : 'Your turn'}`;
  }

  // End turn button
  const et = document.getElementById('btn-end-turn');
  et.style.display = (ht !== 'none' && s.status === 'playing' && !s.winner) ? 'block' : 'none';
}

function appendLog(record) {
  if (!record || !record.log) return;
  const logDiv = document.getElementById('log');
  const turnLine = document.createElement('div');
  turnLine.className = 'log-line turn';
  turnLine.textContent = `── Turn ${record.turn} ──`;
  logDiv.appendChild(turnLine);
  for (const line of record.log) {
    const d = document.createElement('div');
    d.className = 'log-line';
    if (line.includes('KILLED') || line.includes('SOFT-KILLED')) d.className += ' kill';
    else if (line.includes('STRUCK') || line.includes('COMPLETE') || line.includes('objective')) d.className += ' obj';
    else if (line.includes('ROE violation')) d.className += ' roe';
    else if (line.includes('spoof') || line.includes('Spoof') || line.includes('wasted')) d.className += ' spoof';
    else if (line.includes('repositioned') || line.includes('→')) d.className += ' hit';
    d.textContent = line.trim();
    logDiv.appendChild(d);
  }
  logDiv.scrollTop = logDiv.scrollHeight;
}

// ── GAME OVER ─────────────────────────────────────────────────────────────────
function showGameOver(s) {
  const overlay = document.getElementById('overlay');
  const winner  = s.winner;
  const title   = document.getElementById('ov-title');
  const sub     = document.getElementById('ov-sub');
  const stats   = document.getElementById('ov-stats');

  if (winner === 'red') {
    title.textContent = '🔴 RED WINS';
    title.style.color = '#f85149';
  } else {
    title.textContent = '🔵 BLUE HOLDS';
    title.style.color = '#58a6ff';
  }
  sub.textContent = s.win_reason || '';
  const alive = (s.drones||[]).filter(d=>d.status==='active').length;
  const dest  = (s.drones||[]).filter(d=>d.status==='destroyed').length;
  const obj   = (s.drones||[]).filter(d=>d.status==='objective').length;
  stats.innerHTML = `
    <strong>Turns:</strong> ${s.turn} / ${s.deadline}<br>
    <strong>Drones reached objective:</strong> ${obj}<br>
    <strong>Drones destroyed:</strong> ${dest}<br>
    <strong>ROE violations:</strong> ${s.roe_violations}
  `;
  overlay.classList.add('show');
}

// ── POLL ──────────────────────────────────────────────────────────────────────
async function poll() {
  try {
    const r = await fetch('/api/state');
    const s = await r.json();

    if (s.status === 'waiting') return;

    state = s;

    if (s.turn !== lastTurn || s.last_record) {
      lastTurn = s.turn;
      if (s.last_record) appendLog(s.last_record);
    }

    updateUI(s);
    render();

    if (s.winner) {
      clearInterval(pollTimer);
      setTimeout(() => showGameOver(s), 600);
    }
  } catch (e) { /* server not ready */ }
}

// ── START SCREEN ──────────────────────────────────────────────────────────────
async function loadScenarios() {
  const r = await fetch('/api/scenarios');
  scenarios = await r.json();
  const grid = document.getElementById('scenario-grid');
  grid.innerHTML = '';
  for (const [key, sc] of Object.entries(scenarios)) {
    const card = document.createElement('div');
    card.className = 'scenario-card' + (key === selectedScen ? ' selected' : '');
    card.dataset.key = key;
    const diffClass = {'Easy':'diff-easy','Medium':'diff-medium','Hard':'diff-hard'}[sc.difficulty]||'';
    card.innerHTML = `
      <div class="label">${sc.label}</div>
      <div class="desc">${sc.description}</div>
      <div class="meta">
        <span class="${diffClass}">${sc.difficulty}</span> ·
        ${sc.deadline} turns ·
        ${sc.red_needs} objective${sc.red_needs>1?'s':''} needed
      </div>`;
    card.onclick = () => {
      selectedScen = key;
      document.querySelectorAll('.scenario-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
    };
    grid.appendChild(card);
  }
}

// Agent buttons
document.querySelectorAll('.agent-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const team = btn.dataset.team;
    const type = btn.dataset.type;
    document.querySelectorAll(`.agent-btn[data-team="${team}"]`).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    if (team === 'red')  redType  = type;
    else                 blueType = type;
  });
});

document.getElementById('launch-btn').addEventListener('click', async () => {
  const r = await fetch('/api/new_game', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      scenario:   selectedScen,
      red_agent:  redType,
      blue_agent: blueType,
      seed:       Math.floor(Math.random() * 9999),
    })
  });
  if (!r.ok) return;

  // Show game screen
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-screen').classList.add('active');
  document.getElementById('tb-scenario').textContent = (scenarios[selectedScen]||{}).label || selectedScen;

  lastTurn   = -1;
  selectedDrone = null;
  document.getElementById('log').innerHTML = '';
  document.getElementById('overlay').classList.remove('show');

  pollTimer = setInterval(poll, POLL_MS);
  poll();
});

// Menu button — return to start screen
document.getElementById('btn-menu').addEventListener('click', () => {
  clearInterval(pollTimer);
  document.getElementById('game-screen').classList.remove('active');
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('start-screen').style.display = 'flex';
});

// End turn
document.getElementById('btn-end-turn').addEventListener('click', async () => {
  const cfg = state && state.config;
  if (!cfg) return;
  const ht = cfg.human_team;
  if (ht === 'red' || ht === 'both') {
    await fetch('/api/end_turn', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ team: 'red' }) });
  }
  if (ht === 'blue' || ht === 'both') {
    await fetch('/api/end_turn', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ team: 'blue' }) });
  }
});

// Overlay buttons
document.getElementById('ov-rematch').addEventListener('click', async () => {
  document.getElementById('overlay').classList.remove('show');
  const r = await fetch('/api/new_game', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      scenario:   selectedScen,
      red_agent:  redType,
      blue_agent: blueType,
      seed:       Math.floor(Math.random() * 9999),
    })
  });
  lastTurn = -1;
  document.getElementById('log').innerHTML = '';
  pollTimer = setInterval(poll, POLL_MS);
  poll();
});

document.getElementById('ov-menu').addEventListener('click', () => {
  clearInterval(pollTimer);
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('game-screen').classList.remove('active');
  document.getElementById('start-screen').style.display = 'flex';
});

// Canvas click — select drone
document.getElementById('hex-canvas').addEventListener('click', e => {
  if (!state || !state.drones) return;
  const canvas = e.target;
  const rect   = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const cx = canvas.width  / 2;
  const cy = canvas.height / 2;

  let best = null, bestDist = Infinity;
  for (const d of state.drones) {
    if (d.status === 'destroyed') continue;
    const [px, py] = hexToPixel(d.position[0], d.position[1], cx, cy);
    const dist = Math.hypot(mx-px, my-py);
    if (dist < 20 && dist < bestDist) { bestDist = dist; best = d; }
  }
  selectedDrone = best;
  render();
  updateUI(state);
});

// Resize
window.addEventListener('resize', () => { if (state) render(); });

// Init
loadScenarios();
</script>
