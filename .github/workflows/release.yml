name: Release

on:
  release:
    types: [published]

jobs:
  build-mac:
    name: Build macOS release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build source zip with play.command launcher
        run: |
          zip -r dronewar-mac.zip \
            dronewar/ server.py main.py launcher.py play.command \
            static/ pyproject.toml README.md LICENSE \
            --exclude "*.pyc" --exclude "__pycache__/*"
          echo "Contents:"
          unzip -l dronewar-mac.zip | tail -20

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dronewar-mac.zip

  build-windows:
    name: Build Windows exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install pyinstaller flask && pip install -e .

      - name: Build .exe
        run: pyinstaller dronewar.spec

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dronewar.exe
