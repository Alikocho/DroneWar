name: Release

on:
  release:
    types: [published]

jobs:
  build-mac:
    name: Build macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install pyinstaller flask && pip install -e .

      - name: Build .app
        run: pyinstaller dronewar.spec

      - name: Strip quarantine flag
        run: xattr -cr dist/DroneWar.app

      - name: Zip .app bundle
        run: cd dist && zip -r dronewar-mac.zip "DroneWar.app"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dronewar-mac.zip

  build-windows:
    name: Build Windows exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install pyinstaller flask && pip install -e .

      - name: Build .exe
        run: pyinstaller dronewar.spec

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dronewar.exe
